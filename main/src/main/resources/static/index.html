<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Rec</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div id="card-background">
        <div id="add-manga-card">
            <input id="add-search-bar" type="text" placeholder="Manga Name...">
            <button id="search-button">Search</button>
            <div id="search-results"></div>
            <button id="confim-add-button">Confirm</button>
            <button id="close-card-button">Close</button>
        </div>
    </div>

    <div id="user-mangas-container">
        <div class="user-manga-card">
            <div class="name"></div>
            <div class="image"></div>
            <div class="synopsis"></div>
            <div class="user-rating"></div>
            <div class="public-rating"></div>
        </div>
    </div>
    <button id="add-manga-button">Add</button>
    <script type="module" src="JS/AddMangaWindow.js"></script>
    <script type="module" src="JS/CreateMangaCards.js"></script>
</body>
</html>
